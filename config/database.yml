default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://localhost/stock_ticker_development") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://localhost/stock_ticker_test") %>

production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>
